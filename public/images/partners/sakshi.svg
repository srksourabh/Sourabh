  <rect x="16" y="8.5" width="4" height="5" rx="0.8" fill="#000"/>
  <rect x="16" y="30.5" width="4" height="5" rx="0.8" fill="#000"/>
  <rect x="7" y="20" width="5" height="4" rx="0.8" fill="#000"/>
