<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- FR monogram in circle -->
  <circle cx="20" cy="22" r="15" fill="none" stroke="#000" stroke-width="2"/>
  <!-- F letter -->
  <line x1="13" y1="14" x2="13" y2="30" stroke="#000" stroke-width="2"/>
  <line x1="13" y1="14" x2="21" y2="14" stroke="#000" stroke-width="2"/>
  <line x1="13" y1="21" x2="19" y2="21" stroke="#000" stroke-width="1.5"/>
  <!-- R letter -->
  <line x1="23" y1="14" x2="23" y2="30" stroke="#000" stroke-width="2"/>
  <path d="M23,14 Q29,14 29,19 Q29,24 23,24" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="25" y1="24" x2="29" y2="30" stroke="#000" stroke-width="1.5"/>
  <!-- Vertical rule divider -->
  <line x1="42" y1="8" x2="42" y2="44" stroke="#000" stroke-width="0.8"/>
  <!-- FUTURE RELEVANT stacked -->
  <text x="50" y="21" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#000">FUTURE</text>
  <text x="50" y="35" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.3" fill="#000">RELEVANT</text>
  <!-- Consulting tagline -->
  <text x="50" y="47" font-family="Arial, sans-serif" font-size="6" letter-spacing="1.5" fill="#000">CONSULTING</text>
</svg>
