<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Two interlocking circles (ionic pair) -->
  <circle cx="13" cy="22" r="8" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="25" cy="22" r="8" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="13" cy="22" r="2.5" fill="#000"/>
  <circle cx="25" cy="22" r="2.5" fill="#000"/>
  <!-- Positive/negative charge markers -->
  <text x="10" y="18" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#000">+</text>
  <text x="22" y="18" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#000">-</text>
  <!-- IoLiTec wordmark -->
  <text x="42" y="28" font-family="Georgia, serif" font-size="20" fill="#000">
    <tspan font-style="italic" font-weight="400">Io</tspan><tspan font-weight="700">Li</tspan><tspan font-style="italic" font-weight="400">Tec</tspan>
  </text>
  <!-- Tagline -->
  <text x="42" y="42" font-family="Arial, sans-serif" font-size="6.5" fill="#000" letter-spacing="0.5">IONIC LIQUIDS TECHNOLOGIES · GERMANY</text>
</svg>
